{% addCSS "theo/contact.css" %}
{% if collapsibleHeadings == true %}
  {% addJS "collapsibleHeadings.js" %}
  <!-- COLLAPSIBLE_HEADINGS_ENABLED -->
{% endif %}

{% block pagecontent %}

{{content | safe}}


<!-- Cal inline embed code begins -->

<div id="cal-inline-call">
</div>
<script type="text/javascript">
  (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if(typeof namespace === "string"){cal.ns[namespace] = cal.ns[namespace] || api;p(cal.ns[namespace], ar);p(cal, ["initNamespace", namespace]);} else p(cal, ar); return;} p(cal, ar); }; })(window, "https://app.cal.eu/embed/embed.js", "init");
Cal("init", "call", {origin:"https://app.cal.eu"});
Cal.config = Cal.config || {};
Cal.config.forwardQueryParams = true;
  const calInlineSelector = "#cal-inline-call";
  const calLink = "nimrichtr/call";

  const calUiConfig = {
    cssVarsPerTheme: {
      light: { "cal-brand": "#002147" },
      dark: { "cal-brand": "#ce2d4f" }
    },
    hideEventTypeDetails: false,
    layout: "month_view"
  };

  function isDarkModeActive() {
    if (document.documentElement.classList.contains("dark-mode")) {
      return true;
    }

    const storedTheme = localStorage.getItem("theme");
    if (storedTheme !== null) {
      return storedTheme == 1;
    }

    return window.matchMedia("(prefers-color-scheme: dark)").matches;
  }

  function renderCalEmbed(isDarkMode) {
    if (!Cal?.ns?.call) {
      return;
    }

    const calContainer = document.querySelector(calInlineSelector);
    if (!calContainer) {
      return;
    }

    calContainer.innerHTML = "";

    Cal.ns.call("inline", {
      elementOrSelector: calInlineSelector,
      config: {
        layout: "month_view",
        useSlotsViewOnSmallScreen: "true",
        theme: isDarkMode ? "dark" : "light"
      },
      calLink,
    });

    Cal.ns.call("ui", {
      ...calUiConfig,
      theme: isDarkMode ? "dark" : "light"
    });
  }

  renderCalEmbed(isDarkModeActive());

  window.addEventListener("themechange", function (event) {
    renderCalEmbed(Boolean(event.detail && event.detail.darkMode));
  });
  </script>
  <!-- Cal inline embed code ends -->
{% endblock %}
